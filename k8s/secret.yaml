apiVersion: v1
kind: Secret
metadata:
  name: flowforge-fte-secrets
  namespace: flowforge-fte
type: Opaque
# NOTE: These are placeholders. For production, use SealedSecrets or External Secrets.
# You can populate these via: kubectl create secret generic ...
stringData:
  DATABASE_URL: "postgresql://user:password@postgres-service:5432/flowforge_db"
  GROQ_API_KEY: "YOUR_GROQ_API_KEY_HERE"
  TWILIO_ACCOUNT_SID: "YOUR_TWILIO_SID_HERE"
  TWILIO_AUTH_TOKEN: "YOUR_TWILIO_TOKEN_HERE"
  GMAIL_CREDENTIALS_JSON: "{}" # Or mount as volume
