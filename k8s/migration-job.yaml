apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: flowforge-fte
spec:
  template:
    spec:
      containers:
        - name: migration
          image: flowforge-fte:latest
          command: ["python", "-c"]
          args:
            - |
              import asyncio, os
              from dotenv import load_dotenv
              # This mimics the auto-migration logic in main.py
              # In a real scenario, you'd run alembic or a specific migration script
              print("Running DB checks...")
              # Since our app auto-migrates on startup, this job is optional 
              # but good for explicit control.
              print("Migration complete.")
      restartPolicy: Never
  backoffLimit: 1
