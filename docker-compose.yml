services:
  # ---------------------------------------------------------
  # DATABASE (Local PostgreSQL for testing)
  # ---------------------------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: flowforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------------------
  # KAFKA (Message Queue - Optional)
  # ---------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.2
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

  # ---------------------------------------------------------
  # WEB APP (FastAPI)
  # ---------------------------------------------------------
  web:
    build: .
    command: uvicorn production.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flowforge:securepassword@db:5432/flowforge_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - GMAIL_TOKEN_PATH=/app/token.json
      - REPORT_ADMIN_EMAIL=${REPORT_ADMIN_EMAIL}
    volumes:
      - ./token.json:/app/token.json
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
